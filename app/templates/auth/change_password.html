{% extends "base.html" %}{% block title %}Change Password{% endblock %}
{% block topbar_title %}Change Password{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="form-card">
  <h5 class="fw-bold mb-4" style="color:#0F2A4A"><i class="fas fa-key me-2"></i>Change Password</h5>
  {% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
  {% if success %}<div class="alert alert-success py-2 small">{{ success }}</div>{% endif %}
  <form method="post">
    <div class="mb-3"><label class="form-label">Current Password</label><input type="password" name="old_password" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">New Password <small class="text-muted">(min 8 chars)</small></label><input type="password" name="new_password" class="form-control" required minlength="8"></div>
    <div class="mb-4"><label class="form-label">Confirm New Password</label><input type="password" name="confirm_password" class="form-control" required></div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary">Update Password</button>
      <a href="/" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div></div></div>
{% endblock %}

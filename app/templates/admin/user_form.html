{% extends "base.html" %}{% block title %}{{ action }} User{% endblock %}{% block topbar_title %}{{ action }} User{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-6"><div class="form-card">
<h5 class="fw-bold mb-4" style="color:#0F2A4A"><i class="fas fa-user me-2"></i>{{ action }} User</h5>
{% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
<form method="post"><div class="row g-3">
  {% if not user %}
  <div class="col-md-6"><label class="form-label">Username *</label><input name="username" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Email *</label><input type="email" name="email" class="form-control" required></div>
  <div class="col-12"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required minlength="8"></div>
  {% endif %}
  <div class="col-12"><label class="form-label">Full Name</label><input name="full_name" class="form-control" value="{{ user.full_name if user else '' }}"></div>
  <div class="col-md-6"><label class="form-label">Role</label><select name="role" class="form-select">{% for r in roles %}<option value="{{ r }}" {% if user and user.role==r %}selected{% endif %}>{{ r|title }}</option>{% endfor %}</select></div>
  {% if user %}<div class="col-12"><label class="form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label><input type="password" name="new_password" class="form-control" minlength="8"></div>{% endif %}
  <div class="col-12"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if not user or user.is_active %}checked{% endif %}><label class="form-check-label" for="active">Active Account</label></div></div>
</div>
<div class="d-flex gap-2 mt-4"><button class="btn btn-primary fw-semibold"><i class="fas fa-save me-1"></i>Save User</button><a href="/admin/users" class="btn btn-outline-secondary">Cancel</a></div>
</form></div></div></div>{% endblock %}

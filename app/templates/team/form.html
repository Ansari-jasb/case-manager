{% extends "base.html" %}{% block title %}{{ action }} Member{% endblock %}{% block topbar_title %}{{ action }} Team Member{% endblock %}
{% block content %}<div class="row justify-content-center"><div class="col-lg-6"><div class="form-card">
<h5 class="fw-bold mb-4" style="color:#0F2A4A">{{ action }} Team Member</h5>
<form method="post"><div class="row g-3">
  <div class="col-md-6"><label class="form-label">Full Name *</label><input name="name" class="form-control" value="{{ member.name if member else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Role / Designation</label><input name="role" class="form-control" value="{{ member.role if member else '' }}"></div>
  <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ member.email if member else '' }}"></div>
  <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" class="form-control" value="{{ member.phone if member else '' }}"></div>
  <div class="col-12"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if not member or member.is_active %}checked{% endif %}><label class="form-check-label" for="active">Active Member</label></div></div>
</div>
<div class="d-flex gap-2 mt-4"><button class="btn btn-primary fw-semibold"><i class="fas fa-save me-1"></i>Save</button><a href="/team/" class="btn btn-outline-secondary">Cancel</a></div>
</form></div></div></div>{% endblock %}
